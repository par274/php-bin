name: Build Static PHP binaries

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-static-php-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.cfg.outputs.php_version }}
      spc_version: ${{ steps.cfg.outputs.spc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build config
        id: cfg
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")
            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "php_version=#{cfg.fetch("php-version")}"
              f.puts "spc_version=#{cfg.fetch("spc-version")}"
            end
          '

  build:
    name: ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            spc_url_suffix: linux-x86_64.tar.gz
            artifact_os: linux
            artifact_arch: x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            spc_url_suffix: linux-aarch64.tar.gz
            artifact_os: linux
            artifact_arch: arm64
          - os: macos-15-intel
            label: macos-x64
            spc_url_suffix: macos-x86_64.tar.gz
            artifact_os: mac
            artifact_arch: x64
          - os: macos-latest
            label: macos-arm64
            spc_url_suffix: macos-aarch64.tar.gz
            artifact_os: mac
            artifact_arch: arm64
          - os: windows-latest
            label: windows-x64
            spc_url_suffix: windows-x64.exe
            artifact_os: win
            artifact_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup system PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          extensions: curl, openssl, mbstring, sodium, tokenizer, filter

      - name: Read build config
        id: cfg
        shell: bash
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")
            ext = ("${{ matrix.os }}" == "windows-latest") ? Array(cfg["extensions"]["common"]) : (Array(cfg["extensions"]["common"]) + Array(cfg["extensions"]["non_windows"]))
            
            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "extensions=#{ext.join(",")}"
              f.puts "libraries=#{Array(cfg["libraries"]).join(",")}"
              f.puts "cacert_path=#{cfg.fetch("package", {})["cacert-path"] || "cacert.pem"}"
              f.puts "include_ca=#{cfg.fetch("package", {})["include-cacert"] != false}"
            end
          '

      - name: Download SPC
        shell: bash
        run: |
          mkdir -p static-php-cli/bin
          SPC_URL="https://github.com/crazywhalecc/static-php-cli/releases/download/${{ needs.meta.outputs.spc_version }}/spc-${{ matrix.spc_url_suffix }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            curl -fsSL -o "static-php-cli/bin/spc.exe" "$SPC_URL"
          else
            curl -fsSL -o "static-php-cli/bin/spc.tar.gz" "$SPC_URL"
            tar -xzf "static-php-cli/bin/spc.tar.gz" -C static-php-cli/bin
            chmod +x "static-php-cli/bin/spc"
          fi

      - name: Build PHP
        shell: bash
        run: |
          cd static-php-cli
          SPC="./bin/spc"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && SPC="./bin/spc.exe"
          
          $SPC doctor
          $SPC download --with-php=${{ needs.meta.outputs.php_version }} --for-extensions "${{ steps.cfg.outputs.extensions }}" --prefer-pre-built --debug
          $SPC build --build-cli "${{ steps.cfg.outputs.extensions }}" --with-libs="${{ steps.cfg.outputs.libraries }}" --debug

      - name: Prepare Package
        shell: bash
        run: |
          mkdir -p package/bin package/meta package/LICENSES
          EXE_EXT=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && EXE_EXT=".exe"
          
          cp ./static-php-cli/buildroot/bin/php${EXE_EXT} package/bin/
          cp ./static-php-cli/buildroot/build-*.json package/meta/
          [ -d "./static-php-cli/buildroot/license" ] && cp -r ./static-php-cli/buildroot/license/* package/LICENSES/ || true

          if [[ "${{ steps.cfg.outputs.include_ca }}" == "true" ]]; then
            cp "${{ steps.cfg.outputs.cacert_path }}" package/cacert.pem || echo "cacert not found"
            printf "[PHP]\nexpose_php=Off\nmemory_limit=512M\ncurl.cainfo=../../common/cacert.pem\nopenssl.cafile=../../common/cacert.pem\n" > package/php.ini
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: php-bin-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: package/
          retention-days: 1

  sync-repo:
    name: Sync to Repo
    needs: build
    if: always() && !cancelled() && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: tmp-artifacts

      - name: Organize
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p common
          
          [ ! -d tmp-artifacts ] && echo "Hiç artifact bulunamadı." && exit 0

          for dir in tmp-artifacts/php-bin-*; do
            [ ! -d "$dir" ] && continue

            PLATFORM=$(basename "$dir" | sed 's/php-bin-//')
            echo "Processing successful build for $PLATFORM..."
            
            mkdir -p "bin/$PLATFORM" "build-meta/$PLATFORM" "licenses/$PLATFORM"
            
            cp -r "$dir/bin/"* "bin/$PLATFORM/"
            cp -r "$dir/meta/"* "build-meta/$PLATFORM/"
            cp -r "$dir/LICENSES/"* "licenses/$PLATFORM/" 2>/dev/null || true
            
            if [[ -f "$dir/cacert.pem" && ! -f "common/cacert.pem" ]]; then
              cp "$dir/cacert.pem" "common/cacert.pem"
              cp "$dir/php.ini" "common/php.ini"
            fi
          done
          
          git add bin/ build-meta/ licenses/ common/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update static php binaries (partial success)"
            git push origin main
          fi
