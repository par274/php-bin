name: Build Static PHP binaries

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-static-php-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  meta:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.cfg.outputs.php_version }}
      spc_version: ${{ steps.cfg.outputs.spc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build config
        id: cfg
        shell: bash
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")
            php_version = cfg.fetch("php-version").to_s
            spc_version = cfg.fetch("spc-version").to_s

            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "php_version=#{php_version}"
              f.puts "spc_version=#{spc_version}"
            end
          '

  build:
    name: ${{ matrix.os }} / ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            spc_url_suffix: linux-x86_64.tar.gz
            artifact_os: linux
            artifact_arch: x64

          - os: ubuntu-24.04-arm
            label: linux-arm64
            spc_url_suffix: linux-aarch64.tar.gz
            artifact_os: linux
            artifact_arch: arm64

          - os: macos-15-intel
            label: macos-x64
            spc_url_suffix: macos-x86_64.tar.gz
            artifact_os: mac
            artifact_arch: x64

          - os: macos-latest
            label: macos-arm64
            spc_url_suffix: macos-aarch64.tar.gz
            artifact_os: mac
            artifact_arch: arm64

          - os: windows-latest
            label: windows-x64
            spc_url_suffix: windows-x64.exe
            artifact_os: win
            artifact_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup system PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          extensions: curl, openssl, mbstring, sodium, tokenizer, filter
          ini-values: memory_limit=-1

      - name: Read build config
        id: cfg
        shell: bash
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")

            php_version = cfg.fetch("php-version").to_s
            spc_version = cfg.fetch("spc-version").to_s

            ext_cfg = cfg.fetch("extensions", {})
            common = Array(ext_cfg["common"])
            non_windows = Array(ext_cfg["non_windows"])

            extensions = ("${{ matrix.os }}" == "windows-latest") ? common : (common + non_windows)

            libraries   = Array(cfg["libraries"]).join(",")
            cacert_path = cfg.fetch("package", {}).fetch("cacert-path", "cacert.pem").to_s
            include_ca  = cfg.fetch("package", {}).fetch("include-cacert", true) ? "true" : "false"

            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "php_version=#{php_version}"
              f.puts "spc_version=#{spc_version}"
              f.puts "extensions=#{extensions.join(",")}"
              f.puts "libraries=#{libraries}"
              f.puts "cacert_path=#{cacert_path}"
              f.puts "include_cacert=#{include_ca}"
            end
          '

      - name: Set SPC variables
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "SPC_BINARY=spc.exe" >> "$GITHUB_ENV"
          else
            echo "SPC_BINARY=spc" >> "$GITHUB_ENV"
          fi
          echo "SPC_URL=https://github.com/crazywhalecc/static-php-cli/releases/download/${{ steps.cfg.outputs.spc_version }}/spc-${{ matrix.spc_url_suffix }}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=php-${{ steps.cfg.outputs.php_version }}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}" >> "$GITHUB_ENV"

      - name: Download SPC (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p static-php-cli/bin
          curl -fsSL -o "static-php-cli/bin/${SPC_BINARY}.tar.gz" "$SPC_URL"
          tar -xzf "static-php-cli/bin/${SPC_BINARY}.tar.gz" -C static-php-cli/bin
          chmod +x "static-php-cli/bin/$SPC_BINARY"

      - name: Download SPC (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path static-php-cli\bin -Force
          Invoke-WebRequest -Uri "$env:SPC_URL" -OutFile "static-php-cli\bin\$env:SPC_BINARY"

      - name: SPC doctor
        shell: bash
        run: |
          cd static-php-cli
          ${{ matrix.os == 'windows-latest' && '.\bin\spc.exe' || './bin/spc' }} doctor

      - name: Build PHP
        shell: bash
        run: |
          cd static-php-cli
          ${{ matrix.os == 'windows-latest' && '.\bin\spc.exe' || './bin/spc' }} download --with-php=${{ steps.cfg.outputs.php_version }} --for-extensions "${{ steps.cfg.outputs.extensions }}" --prefer-pre-built --debug
          ${{ matrix.os == 'windows-latest' && '.\bin\spc.exe' || './bin/spc' }} build --build-cli "${{ steps.cfg.outputs.extensions }}" --with-libs="${{ steps.cfg.outputs.libraries }}" --debug

      - name: Prepare Package
        shell: bash
        run: |
          PHP_VER=$(${{ matrix.os == 'windows-latest' && './static-php-cli/buildroot/bin/php.exe' || './static-php-cli/buildroot/bin/php' }} -r "echo PHP_VERSION;")
          echo "Built PHP Version: $PHP_VER"
          
          mkdir -p package/bin package/meta package/LICENSES
          
          # Binary kopyalama
          cp ${{ matrix.os == 'windows-latest' && './static-php-cli/buildroot/bin/php.exe' || './static-php-cli/buildroot/bin/php' }} package/bin/
          
          # Metadata kopyalama
          cp ./static-php-cli/buildroot/build-extensions.json package/meta/
          cp ./static-php-cli/buildroot/build-libraries.json package/meta/
          
          # Lisanslar
          [ -d "./static-php-cli/buildroot/license" ] && cp -r ./static-php-cli/buildroot/license/* package/LICENSES/ || true

          if [[ "${{ steps.cfg.outputs.include_cacert }}" == "true" && -f "${{ steps.cfg.outputs.cacert_path }}" ]]; then
            cp "${{ steps.cfg.outputs.cacert_path }}" package/cacert.pem
            cat > package/bin/php.ini <<EOF
          [PHP]
          expose_php=Off
          memory_limit=512M
          curl.cainfo=cacert.pem
          openssl.cafile=cacert.pem
          EOF
          fi

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-bin-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: package/
          retention-days: 1

  sync-repo:
    name: Sync Binaries to Repo
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp-artifacts

      - name: Organize and Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p "common"

          for dir in tmp-artifacts/php-bin-*; do
            PLATFORM=$(basename "$dir" | sed 's/php-bin-//')
            echo "Organizing binaries for $PLATFORM..."
            
            mkdir -p "bin/$PLATFORM" "build-meta/$PLATFORM" "licenses/$PLATFORM"

            rm -rf "bin/$PLATFORM"/* "build-meta/$PLATFORM"/* "licenses/$PLATFORM"/*
            
            cp -r "$dir/bin/"* "bin/$PLATFORM/" 2>/dev/null || true
            cp -r "$dir/meta/"* "build-meta/$PLATFORM/" 2>/dev/null || true
            cp -r "$dir/LICENSES/"* "licenses/$PLATFORM/" 2>/dev/null || true
            
            if [ -f "$dir/php.ini" ] && [ ! -f "common/php.ini" ]; then
                cp "$dir/php.ini" "common/php.ini"
                cp "$dir/cacert.pem" "common/cacert.pem"
            fi
            
          done

          git add bin/ build-meta/ licenses/ common/
          
          if git diff --staged --quiet; then
            echo "No new files to update."
          else
            git commit -m "chore: update binaries and move shared config to common/"
            git push origin main
          fi
